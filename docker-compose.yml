services:
  watchtheflix:
    build: .
    ports:
      - "8787:8787"
    env_file:
      - .env
    environment:
      LOCAL_MEDIA_ROOT: /media
      FFMPEG_HW: ${FFMPEG_HW:-auto}
      SCAN_INTERVAL_MINUTES: ${SCAN_INTERVAL_MINUTES:-60}
    volumes:
      - ./data:/app/data
      # Mount your media library here (read/write for convert jobs)
      - ${HOST_MEDIA_PATH:-/media}:/media
    restart: unless-stopped
